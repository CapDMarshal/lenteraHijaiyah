openapi: 3.0.0
info:
  title: Lentera Hijaiyah API
  description: Dokumentasi API untuk sistem autentikasi dan manajemen akun Custom JWT.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local Development Server

paths:
  /api/v1/auth/register:
    post:
      summary: Registrasi pengguna baru
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Ahmad Fauzi
                email:
                  type: string
                  format: email
                  example: ahmad@example.com
                password:
                  type: string
                  format: password
                  example: rahasia123
                  minLength: 8
      responses:
        "201":
          description: Berhasil registrasi
        "400":
          description: Input tidak valid / Zod Error
        "409":
          description: Email sudah terdaftar

  /api/v1/auth/login:
    post:
      summary: Login pengguna
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: ahmad@example.com
                password:
                  type: string
                  format: password
                  example: rahasia123
      responses:
        "200":
          description: OK - Akan mengembalikan token JWT dan Set-Cookie 'access_token'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    type: object
        "401":
          description: Email atau password salah

  /api/v1/auth/google:
    post:
      summary: Login/Register menggunakan Google OAuth2
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credential
              properties:
                credential:
                  type: string
                  description: JWT (ID Token) yang didapatkan dari popup Google Sign-In frontend
                  example: "eyJhbGciOiJSUzI1NiIsImtp..."
      responses:
        "200":
          description: Berhasil memverifikasi Google Token dan menerbitkan Custom JWT

  /api/v1/auth/me:
    get:
      summary: Ambil data profile pengguna saat ini (Berdasarkan Cookie / Token JWT)
      tags:
        - Authentication
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "404":
          description: Pengguna tidak ditemukan di Database

  /api/v1/auth/logout:
    post:
      summary: Logout Pengguna
      description: Menghapus cookie `access_token` dari browser
      tags:
        - Authentication
      responses:
        "200":
          description: Berhasil Logout

  /api/v1/user/profile:
    get:
      summary: Ambil profil pengguna saat ini
      tags:
        - User
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "404":
          description: Pengguna tidak ditemukan di Database
    put:
      summary: Update profil pengguna
      tags:
        - User
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Ahmad Fauzi
                email:
                  type: string
                  format: email
                  example: ahmad.updated@example.com
      responses:
        "200":
          description: Profil berhasil diperbarui
        "400":
          description: Input tidak valid / Zod Error
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "404":
          description: Pengguna tidak ditemukan di Database
        "409":
          description: Email sudah terdaftar

  /api/v1/user/password:
    put:
      summary: Ubah password pengguna
      tags:
        - User
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  example: rahasia123
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  example: rahasia456
      responses:
        "200":
          description: Password berhasil diperbarui
        "400":
          description: Input tidak valid / Zod Error
        "401":
          description: Unauthorized - Token tidak valid / password salah
        "404":
          description: Pengguna tidak ditemukan di Database

  /api/v1/learning/categories:
    get:
      summary: Ambil daftar kategori modul
      tags:
        - Learning
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - Token tidak valid / tidak ada

  /api/v1/learning/categories/{categoryId}/modules:
    get:
      summary: Ambil daftar modul berdasarkan kategori
      tags:
        - Learning
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
          description: ID kategori modul
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "404":
          description: Kategori tidak ditemukan

  /api/v1/learning/modules/{moduleId}:
    get:
      summary: Ambil detail modul
      tags:
        - Learning
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
          description: ID modul
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "404":
          description: Modul tidak ditemukan
    put:
      summary: Update modul (Admin)
      tags:
        - Learning - Admin
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
          description: ID modul
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Tajwid Dasar (Update)
                content:
                  type: string
                  example: Ringkasan modul tajwid dasar yang diperbarui.
                pdfKey:
                  type: string
                  example: learning/tajwid-dasar/1714800000000-tajwid-dasar.pdf
                categoryId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
      responses:
        "200":
          description: Modul berhasil diperbarui
        "400":
          description: Input tidak valid / Zod Error
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "403":
          description: Forbidden - Hanya admin
        "404":
          description: Modul atau kategori tidak ditemukan
    delete:
      summary: Hapus modul (Admin)
      tags:
        - Learning - Admin
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: moduleId
          in: path
          required: true
          schema:
            type: string
          description: ID modul
      responses:
        "200":
          description: Modul berhasil dihapus
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "403":
          description: Forbidden - Hanya admin
        "404":
          description: Modul tidak ditemukan

  /api/v1/learning/modules:
    post:
      summary: Buat modul baru (Admin)
      tags:
        - Learning - Admin
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content
                - pdfKey
                - categoryId
              properties:
                title:
                  type: string
                  example: Tajwid Dasar
                content:
                  type: string
                  example: Ringkasan modul tajwid dasar.
                pdfKey:
                  type: string
                  example: learning/tajwid-dasar/1714800000000-tajwid-dasar.pdf
                categoryId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
      responses:
        "201":
          description: Modul berhasil dibuat
        "400":
          description: Input tidak valid / Zod Error
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "403":
          description: Forbidden - Hanya admin
        "404":
          description: Kategori tidak ditemukan

  /api/v1/learning/progress:
    get:
      summary: Ambil progress belajar pengguna
      tags:
        - Learning
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
    post:
      summary: Update progress belajar pengguna
      tags:
        - Learning
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - moduleId
                - isCompleted
              properties:
                moduleId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                isCompleted:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Progress berhasil diperbarui
        "400":
          description: Input tidak valid / Zod Error
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "404":
          description: Modul tidak ditemukan

  /api/v1/learning/assets/presign:
    post:
      summary: Presign upload PDF (Admin)
      tags:
        - Learning - Admin
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fileName
                - contentType
              properties:
                fileName:
                  type: string
                  example: tajwid-dasar.pdf
                contentType:
                  type: string
                  example: application/pdf
                folder:
                  type: string
                  example: tajwid-dasar
      responses:
        "200":
          description: Presign berhasil dibuat
        "400":
          description: Input tidak valid / format file salah
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "403":
          description: Forbidden - Hanya admin

  /api/v1/learning/assets:
    delete:
      summary: Hapus file PDF (Admin)
      tags:
        - Learning - Admin
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - key
              properties:
                key:
                  type: string
                  example: learning/tajwid-dasar/1714800000000-tajwid-dasar.pdf
      responses:
        "200":
          description: File berhasil dihapus
        "400":
          description: Input tidak valid / Zod Error
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "403":
          description: Forbidden - Hanya admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Masukkan JWT Token hasil return dari API Login."
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: "Cookie yang diset secara otomatis oleh browser setelah Login."
