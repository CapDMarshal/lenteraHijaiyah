openapi: 3.0.0
info:
  title: Lentera Hijaiyah API
  description: Dokumentasi API untuk sistem autentikasi Custom JWT.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local Development Server

paths:
  /api/v1/auth/register:
    post:
      summary: Registrasi pengguna baru
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Ahmad Fauzi
                email:
                  type: string
                  format: email
                  example: ahmad@example.com
                password:
                  type: string
                  format: password
                  example: rahasia123
                  minLength: 8
      responses:
        "201":
          description: Berhasil registrasi
        "400":
          description: Input tidak valid / Zod Error
        "409":
          description: Email sudah terdaftar

  /api/v1/auth/login:
    post:
      summary: Login pengguna
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: ahmad@example.com
                password:
                  type: string
                  format: password
                  example: rahasia123
      responses:
        "200":
          description: OK - Akan mengembalikan token JWT dan Set-Cookie 'auth_token'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    type: object
        "401":
          description: Email atau password salah

  /api/v1/auth/google:
    post:
      summary: Login/Register menggunakan Google OAuth2
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credential
              properties:
                credential:
                  type: string
                  description: JWT (ID Token) yang didapatkan dari popup Google Sign-In frontend
                  example: "eyJhbGciOiJSUzI1NiIsImtp..."
      responses:
        "200":
          description: Berhasil memverifikasi Google Token dan menerbitkan Custom JWT

  /api/v1/auth/me:
    get:
      summary: Ambil data profile pengguna saat ini (Berdasarkan Cookie / Token JWT)
      tags:
        - Authentication
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized - Token tidak valid / tidak ada
        "404":
          description: Pengguna tidak ditemukan di Database

  /api/v1/auth/logout:
    post:
      summary: Logout Pengguna
      description: Menghapus cookie `auth_token` dari browser
      tags:
        - Authentication
      responses:
        "200":
          description: Berhasil Logout

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Masukkan JWT Token hasil return dari API Login."
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token
      description: "Cookie yang diset secara otomatis oleh browser setelah Login."
