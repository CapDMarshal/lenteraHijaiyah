version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lentera_hijaiyah
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.prisma
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/lentera_hijaiyah?schema=public"
    depends_on:
      - db

volumes:
  postgres_data:
